name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run unit tests
        run: |
          pytest -m unit --cov=python --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio httpx
      
      - name: Start mock servers
        run: |
          docker-compose --profile testing up -d
          sleep 10
      
      - name: Wait for services
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:9999/health; do sleep 2; done'
          timeout 60 bash -c 'until curl -f http://localhost:9998/health; do sleep 2; done'
      
      - name: Run integration tests
        run: |
          pytest -m integration --tb=short
      
      - name: Show service logs on failure
        if: failure()
        run: |
          docker-compose logs mock-llm-app
          docker-compose logs mock-mcp-server
      
      - name: Stop services
        if: always()
        run: |
          docker-compose --profile testing down

  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum
      
      - name: Install dependencies
        working-directory: ./go
        run: go mod download
      
      - name: Run Go tests
        working-directory: ./go
        run: go test -v -race -coverprofile=coverage.out ./...
      
      - name: Upload Go coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./go/coverage.out
          flags: gotests
          name: codecov-go
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
      
      - name: Run ruff
        run: ruff check python/
        continue-on-error: true
      
      - name: Run black
        run: black --check python/
        continue-on-error: true
      
      - name: Run mypy
        run: mypy python/ --ignore-missing-imports
        continue-on-error: true
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: go
        continue-on-error: true
