name: Build

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-go:
    name: Build Go Services
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum
      
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      
      - name: Build probe_server
        working-directory: ./go
        run: go build -v -o ../bin/probe_server ./cmd/probe_server
      
      - name: Build recon_server
        working-directory: ./go
        run: go build -v -o ../bin/recon_server ./cmd/recon_server
      
      - name: Build mcp_server
        working-directory: ./go
        run: go build -v -o ../bin/mcp_server ./cmd/mcp_server
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: bin/
          retention-days: 7

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Go image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.go
          push: false
          tags: llmrt-go:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Python image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.python
          push: false
          tags: llmrt-python:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Shannon image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.shannon
          push: false
          tags: llmrt-shannon:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test docker-compose
        run: |
          docker-compose config
          docker-compose --profile testing config

  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Build package
        run: python -m build
      
      - name: Check package
        run: twine check dist/*
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install safety
        run: pip install safety
      
      - name: Run safety check
        run: safety check --json
        continue-on-error: true
