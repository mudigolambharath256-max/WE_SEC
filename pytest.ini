[pytest]
# Pytest configuration for llmrt

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require services running)
    slow: Slow running tests
    requires_api_key: Tests requiring API keys

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    -ra

# Coverage options (if pytest-cov is installed)
# addopts = --cov=python --cov-report=html --cov-report=term

# Asyncio configuration
asyncio_mode = auto

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (if pytest-timeout is installed)
# timeout = 300
# timeout_method = thread

# Parallel execution (if pytest-xdist is installed)
# addopts = -n auto

# Ignore paths
norecursedirs = .git .tox dist build *.egg external output

# Minimum Python version
minversion = 3.11
